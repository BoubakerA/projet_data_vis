<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Map of Africa</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body style="margin: 0; padding: 0;">
  <h2>Education and Economic Growth in Africa</h2>
    <div id="container" style="
    display: flex;
    flex-direction: row;
    width: 100%;
  ">

      <div id="map-panel" style="flex: 0 0 600px;">
        <svg id="map"></svg>
      </div>

        <!-- RIGHT: split vertically -->
      <div id="right-panel" style="
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 700px; 
      ">
        <!-- Top right -->
        <div id="chart-panel" style="width: 100%; height: 100%;">
          <svg id="chart"></svg>
        </div>
        <!-- Bottom right -->
        <div id="bottom-panel" style="width: 100%; height: 100%;">
          <svg id="metadata"></svg>
        </div>
      </div>
    </div>

  <!-- Tooltip: hidden by default, shown on hover -->
  <div id="tooltip" style="
    position: absolute;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    pointer-events: none;
    display: none;
  "></div>

  <script src="js/script.js"></script>
</body>
</html>
